# Supabase project config for the LedsC4 B2B companion infra.

project_id = "mbjvmhaglbhnxoccwyex"

[functions.list-order-requests]
# Storefront JS (mis-solicitudes, solicitud-detalle) la invoca sin JWT.
# Auth real: HMAC del customer.id firmado por Liquid SSR + tag 'aprobado'.
verify_jwt = false

[functions.submit-order-request]
# Storefront JS (solicitud) la invoca sin JWT al enviar la solicitud.
# Auth real: HMAC del customer.id firmado por Liquid SSR + tag 'aprobado'.
verify_jwt = false

[functions.create-company-for-customer]
# Shopify Flow webhook la invoca sin JWT.
# Auth real: header X-Webhook-Secret == CREATE_COMPANY_WEBHOOK_SECRET.
verify_jwt = false

[functions.promote-whitelist-matches]
# pg_cron invoca la función vía pg_net sin JWT. Deshabilitamos verify_jwt.
# Riesgo mitigado: la URL no es pública y la función solo promueve customers
# que ya están en la whitelist (la cual controla el admin de la tienda).
# TODO producción: añadir header X-Cron-Secret y validar en el handler.
verify_jwt = false

[functions.register-b2b-customer]
# Storefront JS (form en /pages/acceso-profesional#registro) la invoca sin
# JWT al enviar el formulario de alta B2B. Auth real: HMAC-SHA256 de
# `<timestamp>:<nonce>` firmado por Liquid SSR con
# settings.register_b2b_hmac_secret. Mismo secret en env
# REGISTER_B2B_HMAC_SECRET. TTL 5 min. Sustituye al /account/register
# clásico que Shopify rompió al forzar new customer accounts.
verify_jwt = false
