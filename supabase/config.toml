# Supabase project config for the LedsC4 B2B companion infra.

project_id = "mbjvmhaglbhnxoccwyex"

[functions.list-order-requests]
# Storefront JS (mis-solicitudes, solicitud-detalle) la invoca sin JWT.
# Auth real: HMAC del customer.id firmado por Liquid SSR + tag 'aprobado'.
verify_jwt = false

[functions.submit-order-request]
# Storefront JS (solicitud) la invoca sin JWT al enviar la solicitud.
# Auth real: HMAC del customer.id firmado por Liquid SSR + tag 'aprobado'.
verify_jwt = false

[functions.create-company-for-customer]
# Shopify Flow webhook la invoca sin JWT.
# Auth real: header X-Webhook-Secret == CREATE_COMPANY_WEBHOOK_SECRET.
verify_jwt = false

[functions.promote-whitelist-matches]
# pg_cron invoca la función vía pg_net sin JWT. Deshabilitamos verify_jwt.
# Riesgo mitigado: la URL no es pública y la función solo promueve customers
# que ya están en la whitelist (la cual controla el admin de la tienda).
# TODO producción: añadir header X-Cron-Secret y validar en el handler.
verify_jwt = false

[functions.register-b2b-customer]
# Storefront JS (form en /pages/acceso-profesional#registro) la invoca sin
# JWT al enviar el formulario de alta B2B. Auth real: HMAC-SHA256 de
# `<timestamp>:<nonce>` firmado por Liquid SSR con
# settings.register_b2b_hmac_secret. Mismo secret en env
# REGISTER_B2B_HMAC_SECRET. TTL 5 min. Sustituye al /account/register
# clásico que Shopify rompió al forzar new customer accounts.
verify_jwt = false

[functions.complete-b2b-registration]
# Carril gemelo de register-b2b-customer para customers que YA existen en
# Shopify (alta nativa por New Customer Accounts sin pasar por el form
# B2B). Llamada desde /pages/completar-registro al pulsar enviar.
# Auth real: HMAC-SHA256 de `<timestamp>:<nonce>:<customerId>` firmado por
# Liquid SSR con settings.register_b2b_hmac_secret (MISMO secret que
# register-b2b-customer; el customerId en la firma evita reuso entre
# carriles). TTL 1 hora. Hace customerUpdate (no Create) + tagsAdd
# 'pendiente'; guardia: si tag aprobado/rechazado responde noop sin tocar.
verify_jwt = false

# --- Backoffice (Fase BO) ---
# Las 4 funciones siguientes sirven /pages/admin-backoffice. Auth real
# en todas: HMAC-SHA256 del approver.id firmado por Liquid SSR con
# settings.backoffice_hmac_secret + verificación server-side de tag
# 'backoffice' en cada request (assertBackofficeTag). El `{% if %}` del
# page template es solo UX; la seguridad vive en cada handler.

[functions.list-pending-customers]
# Storefront JS (admin-backoffice) la invoca sin JWT al cargar la página
# y tras cada acción para refrescar lista + counts.
verify_jwt = false

[functions.update-whitelist]
# Storefront JS la invoca al pulsar "Añadir a whitelist". Edita el shop
# metafield b2b.whitelist_emails y dispara promote-whitelist-matches
# (URL en env PROMOTE_WHITELIST_FUNCTION_URL).
verify_jwt = false

[functions.approve-customer]
# Storefront JS la invoca al pulsar "Aprobar". Cambia tags atómicamente
# pendiente→aprobado vía customerUpdate; W2 hace fecha + Company + email.
verify_jwt = false

[functions.reject-customer]
# Storefront JS la invoca al pulsar "Rechazar". Setea motivo (si hay) +
# fecha_rechazo ANTES del cambio de tag para que W3 envíe el email 5 con
# el motivo poblado. Cambia tags atómicamente pendiente→rechazado.
verify_jwt = false

# --- Importer (Fase I4) ---
# Job 1: descarga los CSVs del SFTP del cliente a Storage y crea row de
# tracking en public.import_runs. JWT obligatorio — solo invocable por
# pg_cron (I4.3) o por Dani manualmente con anon/service key. NO público.
[functions.sftp-sync]
verify_jwt = true

# --- Currency display (Fase Currency-Display) ---
[functions.update-fx-rates]
# pg_cron semanal invoca esta función vía pg_net sin JWT (refresca el shop
# metafield ledsc4.fx_rates con tasas Frankfurter). También invocable
# manualmente para forzar refresh. No expone datos sensibles ni acepta
# input no-confiable: solo lee Frankfurter y escribe el metafield.
verify_jwt = false
