site_name: Documentación LedsC4 B2B
site_description: Documentación técnica, de administración y operación
site_url: https://danielpenamad.github.io/shopify-ledsc4-theme/
repo_url: https://github.com/danielpenamad/shopify-ledsc4-theme
repo_name: shopify-ledsc4-theme
edit_uri: edit/main/docs/

exclude_docs: |
  _archive/

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Desarrollo:
      - desarrollo/index.md
      - Arquitectura: desarrollo/00-arquitectura.md
      - Modelo de datos: desarrollo/01-data-model.md
      - Importer: desarrollo/02-importer.md
      - Importer · despliegue: desarrollo/02b-importer-deploy.md
      - Theme y customizaciones: desarrollo/03-theme-customizaciones.md
      - Storefront gate: desarrollo/04-storefront-gate.md
      - Registro B2B: desarrollo/05-registro-b2b.md
      - Backoffice: desarrollo/06-backoffice.md
      - Solicitudes de pedido: desarrollo/07-solicitudes-pedido.md
      - Emails transaccionales: desarrollo/08-emails-transaccionales.md
      - Internacionalización (i18n): desarrollo/09-i18n.md
      - Multidivisa: desarrollo/10-multicurrency.md
      - Proyecto Supabase: desarrollo/11-supabase.md
      - Repositorio GitHub: desarrollo/12-github-repo.md
      - GitHub Actions: desarrollo/13-github-actions.md
      - Secrets: desarrollo/14-secrets.md
      - Scripts: desarrollo/15-scripts.md
      - Operations runbook: desarrollo/16-operations-runbook.md
      - ADRs:
          - desarrollo/adrs/index.md
          - D1 · Plan Grow: desarrollo/adrs/d01-plan-grow.md
          - D2 · B2B nativo: desarrollo/adrs/d02-b2b-nativo.md
          - D3 · Flow + Supabase: desarrollo/adrs/d03-flow-supabase.md
          - D4 · Gate híbrido: desarrollo/adrs/d04-gate-hibrido.md
