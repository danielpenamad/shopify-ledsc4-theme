          - D8 · Predeterminado: desarrollo/adrs/d08-predeterminado.md
          - D9 · Metafields ampliados: desarrollo/adrs/d09-metafields-ampliados.md
          - D10 · 3 CSVs SFTP: desarrollo/adrs/d10-3-csvs-sftp.md
          - D11 · Image pre-upload: desarrollo/adrs/d11-image-pre-upload.md
          - D12 · Pipeline split: desarrollo/adrs/d12-pipeline-split.md
